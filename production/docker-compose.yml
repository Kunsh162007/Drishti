# ============================================================================
# DRISHTI — PRODUCTION topology (illustrative, runnable-in-principle)
# ----------------------------------------------------------------------------
# SAME application code as the demo. Only the surrounding infrastructure and
# the environment variables change. The app container reuses demo/ verbatim;
# DATABASE_URL / LLM_PROVIDER / graph + vector endpoints are injected here.
#
#   reverse proxy (Caddy, TLS)  ──►  app (FastAPI / uvicorn, the demo code)
#                                       │
#         ┌─────────────────────────────┼───────────────────────────────┐
#         ▼                             ▼                               ▼
#   PostgreSQL + PostGIS           Neo4j (graph)                  Qdrant (vectors)
#   (crimes/persons/vehicles,   (person↔vehicle↔crime         (MO-linkage &
#    spatial + relational)        networks, communities)        assistant RAG)
#
# Usage:
#   cp .env.production.example .env.production
#   # edit secrets (DB password, ANTHROPIC/LLM key, Neo4j password, domain)
#   docker compose --env-file .env.production up -d
#
# NOTE: This is a reference topology for self-hosted / on-prem / GovCloud. In a
# real sovereign deployment, secrets come from an HSM/KMS (not a .env file),
# and managed Postgres/GPU nodes replace some of these containers.
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # APP — the exact same FastAPI application as the demo.
  # Build context points at ../demo so we reuse the demo Dockerfile & code.
  # --------------------------------------------------------------------------
  app:
    build:
      context: ../demo
      dockerfile: Dockerfile
    image: drishti-app:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      DRISHTI_MODE: production
      # ---- Relational + spatial store: Postgres + PostGIS ----
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      # ---- Assistant: real LLM, grounded on the same retrieved context ----
      LLM_PROVIDER: "${LLM_PROVIDER}"          # anthropic | groq | openai
      LLM_API_KEY: "${LLM_API_KEY}"            # from HSM/KMS in a real deploy
      LLM_MODEL: "${LLM_MODEL}"                # e.g. claude-opus-4-8
      # ---- Graph + vector backends ----
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "${NEO4J_USER}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD}"
      QDRANT_URL: "http://qdrant:6333"
      PORT: "8000"
    expose:
      - "8000"
    # The DB lives in Postgres now, so no SQLite seeding at runtime. If you want
    # to load the bundled seed CSVs into Postgres on first boot, run the seeder
    # once as a one-off: `docker compose run --rm app python scripts/seed_db.py`
    # after pointing DATABASE_URL at Postgres (the seeder is DB-agnostic).

  # --------------------------------------------------------------------------
  # POSTGRESQL + POSTGIS — relational + geospatial store (replaces SQLite).
  # --------------------------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Not exposed publicly — only the app (and the proxy) reach it on the
    # internal network. Open a host port only for admin/debug if you must.
    expose:
      - "5432"

  # --------------------------------------------------------------------------
  # NEO4J — graph database for person/vehicle/crime networks & communities.
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["graph-data-science"]'   # community detection, centrality
    volumes:
      - neo4jdata:/data
    expose:
      - "7687"   # bolt
      - "7474"   # http browser (keep internal / behind proxy)

  # --------------------------------------------------------------------------
  # QDRANT — vector store for semantic MO-linkage and assistant RAG retrieval.
  # --------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    volumes:
      - qdrantdata:/qdrant/storage
    expose:
      - "6333"   # REST
      - "6334"   # gRPC

  # --------------------------------------------------------------------------
  # REVERSE PROXY — Caddy: automatic TLS, single public entrypoint.
  # Only this service binds host ports 80/443. Everything else is internal.
  # --------------------------------------------------------------------------
  proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    # Inline Caddyfile via command: TLS-terminate ${DOMAIN} and reverse-proxy
    # everything to the app on :8000. Replace with a mounted Caddyfile for more
    # routing (rate limits, IP allow-lists for the gov network, etc.).
    command: >
      caddy reverse-proxy
      --from ${DOMAIN}
      --to app:8000
    volumes:
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
  caddydata:
  caddyconfig:
